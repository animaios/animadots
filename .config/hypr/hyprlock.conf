# hyprlock — AnimaDots dark theme
# Matches the AnimaDots palette: deep dark bg, blue accent (#33ccff)

$font = JetBrains Mono
$accent = rgba(33ccffee)
$green = rgba(00ff99ee)
$bg = rgba(14, 16, 22, 0.98)

general {
    hide_cursor = false
    grace = 5
    no_fade_in = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    brightness = 0.6
    contrast = 0.8
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    inner_color = rgba(0, 0, 0, 0.0)
    outer_color = $accent $green 45deg
    check_color = $green rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg
    font_color = rgba(217, 217, 230, 0.7)
    fade_on_empty = false
    rounding = 12
    font_family = $font
    placeholder_text = <i>Enter password...</i>
    fail_text = <b>$PAMFAIL</b>
    position = 0, -50
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = $TIME
    font_size = 90
    font_family = $font
    color = rgba(255, 255, 255, 0.9)
    position = 0, -160
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 22
    font_family = $font
    color = rgba(217, 217, 230, 0.6)
    position = 0, -220
    halign = center
    valign = center
}

# AnimaDots branding
label {
    monitor =
    text = AnimaDots
    font_size = 16
    font_family = $font
    color = rgba(51, 204, 255, 0.4)
    position = 20, -20
    halign = left
    valign = bottom
}
