# Hypridle — AnimaDots
# 5 min idle: turn off screen + start idle services (beesd, etc.)

listener {
    timeout = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

listener {
    timeout = 300
    on-timeout = systemctl start hyprland-idle.target
    on-resume  = systemctl stop hyprland-idle.target
}
