# Hypridle configuration — replaces gnome-idle-monitor.sh
#
# Manages gnome-idle.target based on user activity.
# Installs to: ~/.config/hypr/hypridle.conf
# Enable with: systemctl --user enable --now hypridle.service
#
# The idle timeout is controlled directly here (not via dconf).
# Default 300s (5 min); change to match your preference.

general {
    # lock_cmd = pidof hyprlock || hyprlock
    # unlock_cmd =
}

# Start gnome-idle.target when the user goes idle, stop on resume.
listener {
    timeout = 300
    on-timeout = systemctl start gnome-idle.target
    on-resume  = systemctl stop gnome-idle.target
}
