# hyprexpose config — themed for Hyprland setup
# All keys are optional — omitted keys fall back to the defaults.

# ── Appearance ────────────────────────────────────────────────────────────────

[appearance]

font = "Sans 11"
label_font = "Sans Bold 13"

card_padding = 24.0
card_radius = 12.0

max_card_width  = 480.0
max_card_height = 320.0

label_height = 32.0
thumb_padding = 8.0
select_border = 3.0

# ── Colors ────────────────────────────────────────────────────────────────────
# Matches the theme from hyprland.lua:
#   active border: #33ccff → #00ff99 gradient
#   inactive border: #595959

[colors]

# Full-screen dim overlay (dark, ~75% opacity)
background = "#0a0a12bf"

# Workspace card background
card = "#1a1a24f2"

# Selection highlight — matches active border blue
selection = "#33ccffe6"

# Workspace label text
label = "#d9d9e6ff"

# "(empty)" placeholder text
empty_label = "#80808094"

# Window title text
window_label = "#ffffffe6"

# Active window indicator — matches active border green
active_window = "#00ff99f2"

# ── Behavior ──────────────────────────────────────────────────────────────────

[behavior]

no_preview = false
switch_on_move = true
allow_mouse = true
